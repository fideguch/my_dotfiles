# ==========================================================
# Starship プロンプト設定 — Pokemon Terminal v2.0
# Pokemon Trainer Card 風: 各セグメントをタイプカラーで色分け
# 参考: 公式タイプ別カラーチャート (Pokemon Aaah Type Icons)
# ==========================================================

"$schema" = "https://starship.rs/config-schema.json"
palette = "pokemon"

[palettes.pokemon]
# Pokemon タイプカラー (公式)
type_electric = "#F8D030"
type_fire     = "#F08030"
type_water    = "#6890F0"
type_grass    = "#78C850"
type_psychic  = "#F85888"
type_dragon   = "#7038F8"
type_ground   = "#E0C068"
type_steel    = "#B8B8D0"
type_fighting = "#C03028"
type_dark     = "#705848"
# テキスト
text_black    = "#1A1200"
text_white    = "#FFFFFF"
# 失敗時
fire_red      = "#8B0000"

# 多段プロンプト: トレーナー情報 → ◉ ポケボール
format = """
$username\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$aws\
$docker_context\
$line_break\
$character"""

right_format = """
$custom.pokemon\
$time"""

# ── トレーナー名 (でんきタイプ・ピカチュウ黄) ─────────
[username]
format = "[ ⚡$user ](bold fg:text_black bg:type_electric)"
show_always = true

# ── 現在地 (みずタイプ・カスミブルー) ───────────────────
[directory]
format = "[ 📁 $path ](bold fg:text_white bg:type_water)"
truncation_length = 4
truncation_symbol = "…/"

# ── Git ブランチ (くさタイプ・ツタの蔓) ─────────────────
[git_branch]
symbol = "🌿"
format = "[ $symbol $branch ](bold fg:text_white bg:type_grass)"

[git_status]
format = '([ $all_status$ahead_behind](bold fg:text_white bg:type_grass))'
conflicted = "= "
ahead = "⇡ "
behind = "⇣ "
untracked = "? "
modified = "! "
staged = "+ "
deleted = "✘ "

# ── 言語 (エスパー pink でレベル感) ──────────────────────
[python]
symbol = "🐍"
format = "[ $symbol $version ](bold fg:text_white bg:type_psychic)"

[nodejs]
symbol = "⬢"
format = "[ $symbol $version ](bold fg:text_white bg:type_grass)"

# ── AWS (ほのおタイプ・リザードン橙) ────────────────────
[aws]
symbol = "☁"
format = "[ $symbol $profile ](bold fg:text_white bg:type_fire)"
[aws.region_aliases]
ap-northeast-1 = "jp"

# ── Docker (みずタイプ) ──────────────────────────────────
[docker_context]
symbol = "🐳"
format = "[ $symbol $context ](bold fg:text_white bg:type_water)"

# ── 時間 (right_format、でんき色テキストのみ) ───────────
[time]
disabled = false
format = "[ $time](bold fg:type_electric)"
time_format = "%H:%M"

# ── プロンプト ◉ モンスターボール (純赤) ────────────────
[character]
success_symbol = "[ ◉](bold fg:#EE1515)"
error_symbol   = "[ ✗](bold fg:#FF4444)"

# ── Living Prompt: 右下に krabby silhouette (Phase γ) ──
[custom.pokemon]
description = "Living Prompt: 右下に krabby silhouette"
when = true
command = "krabby random --no-title -s 2>/dev/null | head -3 || echo ''"
format = "[$output](fg:type_grass)"
shell = ["bash", "--noprofile", "--norc"]
