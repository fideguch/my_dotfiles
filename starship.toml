# ==========================================================
# Starship プロンプト設定
# ピカチュウ背景対応: 暗色帯 + 白テキスト / 黄色上は暗色テキスト
# ==========================================================

"$schema" = "https://starship.rs/config-schema.json"

format = """
[](fg:#1A1200)\
$username\
$directory\
$git_branch\
$git_status\
$time\
[](fg:#1A1200)\
$line_break\
$character"""

[username]
format = "[ $user ](bold fg:#FFFFFF bg:#1A1200)"
show_always = true

[directory]
format = "[ $path ](bold fg:#FFFFFF bg:#1A1200)"
truncation_length = 4
truncation_symbol = "…/"

[git_branch]
symbol = ""
format = "[ $symbol $branch ](bold fg:#FFFFFF bg:#1A1200)"

[git_status]
format = '([$all_status$ahead_behind](bold fg:#FFFFFF bg:#1A1200))'
conflicted = "= "
ahead = "⇡ "
behind = "⇣ "
untracked = "? "
modified = "! "
staged = "+ "
deleted = "✘ "

[time]
disabled = false
format = "[ $time ](bold fg:#FFFFFF bg:#1A1200)"
time_format = "%H:%M"

[character]
success_symbol = "[](fg:#1A1200)[  ](bold fg:#FFFFFF bg:#1A1200)[](fg:#1A1200)"
error_symbol = "[](fg:#8B0000)[  ](bold fg:#FFFFFF bg:#8B0000)[](fg:#8B0000)"

[python]
format = "[ py $version ](fg:#FFFFFF bg:#1A1200)"

[nodejs]
format = "[ node $version ](fg:#FFFFFF bg:#1A1200)"

[aws]
format = "[ aws:$profile ](fg:#FFFFFF bg:#1A1200)"
[aws.region_aliases]
ap-northeast-1 = "jp"

[docker_context]
format = "[ docker:$context ](fg:#FFFFFF bg:#1A1200)"
