# ==========================================================
# Starship プロンプト設定
# https://starship.rs/ja-JP/config/
# ==========================================================

"$schema" = "https://starship.rs/config-schema.json"

format = "[靈](fg:046) $all"

# 時間
[time]
disabled = false
style = "bold fg:086"
format = "[$time]($style) "
time_format = "%H:%M"

# ユーザー名
[username]
format = "שּ ($style) [$user]($style) in "
style_root = "bold bg:255 fg:208"
style_user = "bold fg:208"
show_always = true

# ディレクトリ
[directory]
style = "bold bg:023 fg:123"
truncation_length = 8
truncation_symbol = "…/"
read_only = " 󰌾"

# コマンド入力前文字
[character]
success_symbol = "[切](bold fg:227) "
error_symbol = "[](bold fg:201) "

# Git ブランチ
[git_branch]
symbol = " "
style = "bold fg:077"

# Git ステータス
[git_status]
conflicted = "🏳 "
ahead = "🏎💨 "
behind = "😰 "
diverged = "😵 "
untracked = "🤷 "
stashed = "📦 "
modified = " "
staged = '[++\($count\)](green)'
renamed = "👅 "
deleted = "🗑 "

# AWS
[aws]
format = "on [$symbol$profile]($style) "
style = "bold fg:208"
symbol = " "
[aws.region_aliases]
ap-northeast-1 = "jp"

# Docker
[docker_context]
format = "via [  $context](bold 069)"

# Python (pyenvバージョン表示)
[python]
format = "via [${symbol}${pyenv_prefix}(${version})]($style) "
symbol = " "

# Node.js
[nodejs]
format = "via [$symbol($version)]($style) "
symbol = " "
